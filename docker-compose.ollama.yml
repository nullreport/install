# Optional add-on: run Ollama as part of the stack for zero-install local AI.
#
# Layer it on top of the prebuilt-image compose:
#   docker compose -f docker-compose.prod.yml -f docker-compose.ollama.yml up -d
#
# (The one-line installer wires this up for you if you answer "yes" to local AI,
# or pass WITH_OLLAMA=1.)
#
# Pull a model once (downloads into the ollama-data volume):
#   docker compose -f docker-compose.prod.yml -f docker-compose.ollama.yml exec ollama ollama pull qwen3
#
# Then in Settings → AI → Ollama: the Server URL is already pointed at the
# bundled service (http://ollama:11434), so just pick your model.
#
# NOTE: this runs CPU inference by default (no GPU = slow). For GPU, add a
# deploy.resources.reservations.devices block per the Ollama Docker docs, and
# make sure the NVIDIA Container Toolkit is installed on the host.

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    # Uncomment to also reach Ollama directly from the host on :11434:
    # ports:
    #   - "11434:11434"

  backend:
    # Point the app at the bundled Ollama service instead of a host install.
    environment:
      OLLAMA_URL: http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama-data:
